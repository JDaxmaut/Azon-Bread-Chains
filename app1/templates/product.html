{% extends "base.html" %}

{% block title %}Product {{ id }}{% endblock %}

{% block content %}
<div class="product-detail">
    <div class="product-detail-image">
        <img src="https://i.guim.co.uk/img/media/85b5c0ba3d6036d58729076b5ef59de798ee2937/0_43_3465_4157/master/3465.jpg?width=465&dpr=1&s=none&crop=none" alt="Товар {{ id }}">
    </div>
    <div class="product-detail-info">
        <h1>Товар {{ id }}</h1>
        <p>Подробное описание товара {{ id }}. Высокое качество и отличная цена!</p>
        <p class="product-detail-price">${{ id }}0</p>
        <a href="{% url 'goods' %}" class="btn-back">← Вернуться к товарам</a>
    </div>
</div>
{% endblock %}
